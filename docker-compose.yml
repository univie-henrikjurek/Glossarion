services:
  db:
    image: postgres:15-alpine
    container_name: glossarion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: glossarion
      POSTGRES_PASSWORD: glossarion_dev_2024
      POSTGRES_DB: glossarion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glossarion"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - glossarion_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glossarion_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://glossarion:glossarion_dev_2024@db:5432/glossarion
      LIBRETRANSLATE_URL: http://libretranslate:5000
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://localhost:5173"
      SOURCE_LANGUAGE: en
      TARGET_LANGUAGES: en,de,fr,it,pl
    depends_on:
      db:
        condition: service_healthy
    networks:
      - glossarion_network

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: glossarion_libretranslate
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      LIMIT_FILE_SIZE: true
      REQUIRE_API_KEY: false
      LT_LOAD_ONLY: en,de,fr,it,pl
    depends_on:
      - redis
    networks:
      - glossarion_network

  redis:
    image: redis:7-alpine
    container_name: glossarion_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - glossarion_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glossarion_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - glossarion_network

volumes:
  postgres_data:
  redis_data:

networks:
  glossarion_network:
    driver: bridge